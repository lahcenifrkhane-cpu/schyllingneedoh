<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Your Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="checkout-page">
      <div class="container checkout-wrap">
        <section class="checkout-card payment-card" aria-labelledby="confirmation-title">
          <h1 id="confirmation-title">Confirm Your Information</h1>
          <p class="checkout-subtitle">Please review your details, quantity, and total amount before payment.</p>

          <section class="order-summary" aria-label="Customer information summary">
            <h2>Order Confirmation</h2>
            <dl>
              <div>
                <dt>Name</dt>
                <dd id="summaryName">-</dd>
              </div>
              <div>
                <dt>Location</dt>
                <dd id="summaryLocation">-</dd>
              </div>
              <div>
                <dt>Phone Number</dt>
                <dd id="summaryPhone">-</dd>
              </div>
              <div>
                <dt>Order</dt>
                <dd id="summaryOrderInfo">-</dd>
              </div>
              <div>
                <dt>Quantity</dt>
                <dd id="summaryQuantity">-</dd>
              </div>
              <div>
                <dt>Total Amount</dt>
                <dd id="summaryTotal">-</dd>
              </div>
            </dl>
          </section>

          <section class="payment-methods" aria-label="Payment action">
            <div class="payment-block">
              <h2>Complete Payment</h2>
              <p class="method-note">Click Pay Now to complete your payment with PayPal.</p>
              <button id="pay-now-btn" class="pay-btn pay-btn--mastercard" type="button">Pay Now</button>
              <div id="paypal-button-container" style="display:none;"></div>
            </div>
          </section>

          <a class="back-link" href="checkout.html">Edit Information</a>
        </section>
      </div>
    </main>

    <script src="https://www.paypal.com/sdk/js?client-id=ATBBVYJdCI_S6b23n3QzClhr7-Kv3FwFF1gLrOqPk7zJk002V525AGkmVKY_9pWGLsNXiR1l7GgS3pm2&currency=USD"></script>
    <script src="payment.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const unitPrice = 19.99;
      const quantity = Math.max(1, Number.parseInt(params.get("quantity") || "1", 10) || 1);
      const orderAmount = (unitPrice * quantity).toFixed(2);

      paypal.Buttons({
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [
              {
                amount: {
                  value: orderAmount
                },
                description: "Product Order x" + quantity
              }
            ]
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(function(details) {
            window.alert(
              "Thank you " + details.payer.name.given_name + "! Your payment of $" + orderAmount + " was successful."
            );
            window.location.href = "thank-you.html";
          });
        },
        onError: function(err) {
          window.alert("An error occurred during payment. Please try again.");
          console.log(err);
        }
      }).render("#paypal-button-container");

      document.getElementById("pay-now-btn").addEventListener("click", function() {
        const hiddenPayButton = document.querySelector("#paypal-button-container button");
        if (hiddenPayButton) {
          hiddenPayButton.click();
        }
      });
    </script>
  </body>
</html>
