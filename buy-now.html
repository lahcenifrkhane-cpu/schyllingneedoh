<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Color | Jelly Bear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .color-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .color-card {
        width: min(860px, 96vw);
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(28, 28, 28, 0.1);
        border-radius: 20px;
        box-shadow: 0 14px 28px rgba(28, 28, 28, 0.1);
        padding: 1.2rem;
      }

      .color-card h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(1.4rem, 4vw, 2rem);
      }

      .color-subtitle {
        text-align: center;
        margin: 0.5rem 0 1rem;
        color: var(--text-secondary);
      }

      .color-pills {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .color-pill {
        border: 1px solid rgba(28, 28, 28, 0.12);
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        background: #fff;
      }

      .gallery {
        position: relative;
      }

      .gallery-track {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: min(260px, 72vw);
        gap: 0.8rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        padding: 0.25rem 0.1rem 0.6rem;
      }

      .gallery-track::-webkit-scrollbar {
        height: 8px;
      }

      .gallery-track::-webkit-scrollbar-thumb {
        background: rgba(184, 22, 82, 0.35);
        border-radius: 999px;
      }

      .gallery-item {
        scroll-snap-align: center;
        background: #ffffff;
        border: 1px solid rgba(28, 28, 28, 0.1);
        border-radius: 16px;
        padding: 0.8rem;
        display: grid;
        gap: 0.45rem;
        text-align: center;
      }

      .gallery-item img {
        width: 100%;
        height: 220px;
        object-fit: contain;
      }

      .gallery-item strong {
        font-family: "Poppins", sans-serif;
        color: var(--cta-dark);
      }

      .gallery-nav {
        display: flex;
        justify-content: center;
        gap: 0.6rem;
        margin-top: 0.8rem;
      }

      .gallery-nav button {
        border: 0;
        background: #ffffff;
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(28, 28, 28, 0.12);
      }

      .pay-wrap {
        margin-top: 1.2rem;
        display: grid;
        place-items: center;
      }
    </style>
  </head>
  <body>
    <main class="color-page">
      <section class="color-card">
        <h1>Choose Your Color</h1>
        <p class="color-subtitle">Swipe or use arrows to browse all jelly bear colors.</p>

        <div class="color-pills" aria-label="Available colors">
          <span class="color-pill">Pink</span>
          <span class="color-pill">Blue</span>
          <span class="color-pill">Purple</span>
          <span class="color-pill">Orange</span>
        </div>

        <div class="gallery">
          <div class="gallery-track" id="gallery-track" aria-label="Jelly bear gallery">
            <article class="gallery-item">
              <img src="pink jell bear.png" alt="Pink jelly bear" />
              <strong>Pink Jelly Bear</strong>
            </article>
            <article class="gallery-item">
              <img src="blue jell bear.png" alt="Blue jelly bear" />
              <strong>Blue Jelly Bear</strong>
            </article>
            <article class="gallery-item">
              <img src="purple jell bear.png" alt="Purple jelly bear" />
              <strong>Purple Jelly Bear</strong>
            </article>
            <article class="gallery-item">
              <img src="orange jell bear.png" alt="Orange jelly bear" />
              <strong>Orange Jelly Bear</strong>
            </article>
          </div>

          <div class="gallery-nav">
            <button type="button" id="prev-btn" aria-label="Previous image">&#8592;</button>
            <button type="button" id="next-btn" aria-label="Next image">&#8594;</button>
          </div>
        </div>

        <div>
  <style>.pp-5FYD6BMD2M2BL{text-align:center;border:none;border-radius:0.25rem;min-width:11.625rem;padding:0 2rem;height:2.625rem;font-weight:bold;background-color:#FFD140;color:#000000;font-family:"Helvetica Neue",Arial,sans-serif;font-size:1rem;line-height:1.25rem;cursor:pointer;}</style>
  <form action="https://www.paypal.com/ncp/payment/5FYD6BMD2M2BL" method="post" target="_blank" style="display:inline-grid;justify-items:center;align-content:start;gap:0.5rem;">
    <input class="pp-5FYD6BMD2M2BL" type="submit" value="pay now" />
    <img src=https://www.paypalobjects.com/images/Debit_Credit.svg alt="cards" />
    <section style="font-size: 0.75rem;"> مدعوم من <img src="https://www.paypalobjects.com/paypal-ui/logos/svg/paypal-wordmark-color.svg" alt="paypal" style="height:0.875rem;vertical-align:middle;"/></section>
  </form>
</div>
      </section>
    </main>

    <script>
      const track = document.getElementById("gallery-track");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");

      const step = () => Math.max(260, track.clientWidth * 0.8);

      prevBtn.addEventListener("click", () => {
        track.scrollBy({ left: -step(), behavior: "smooth" });
      });

      nextBtn.addEventListener("click", () => {
        track.scrollBy({ left: step(), behavior: "smooth" });
      });
    </script>
  </body>
</html>
