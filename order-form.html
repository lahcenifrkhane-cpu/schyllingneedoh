<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(440px, 100%);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      padding: 22px;
    }
    h2 {
      margin: 0 0 14px;
      color: #222;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    input,
    select {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
    }
    .payment-wrap {
      margin-top: 6px;
      text-align: center;
    }
    .payment-icons {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Customer Information</h2>

    <form id="order-form">
      <div class="field">
        <input type="text" id="fullName" placeholder="Full Name" required>
      </div>

      <div class="field">
        <input type="text" id="firstName" placeholder="First Name" required>
      </div>

      <div class="field">
        <input type="text" id="address" placeholder="Full Address" required>
      </div>

      <div class="field">
        <input type="text" id="country" placeholder="Country" required>
      </div>

      <div class="field">
        <input type="text" id="city" placeholder="City" required>
      </div>

      <div class="field">
        <input type="text" id="phone" placeholder="Phone Number" required>
      </div>

      <div class="field">
        <input type="text" id="postalCode" placeholder="Postal Code" required>
      </div>

      <div class="field">
        <select id="color" required>
          <option value="" selected disabled>Select Color</option>
          <option value="orange">orange</option>
          <option value="pink">pink</option>
          <option value="blue">blue</option>
          <option value="purple">purple</option>
        </select>
      </div>
    </form>

    <div>
  <style>.pp-5FYD6BMD2M2BL{text-align:center;border:none;border-radius:0.25rem;min-width:11.625rem;padding:0 2rem;height:2.625rem;font-weight:bold;background-color:#f243cc;color:#000000;font-family:"Helvetica Neue",Arial,sans-serif;font-size:1rem;line-height:1.25rem;cursor:pointer;}</style>
  <form id="paypal-form" action="https://www.paypal.com/ncp/payment/5FYD6BMD2M2BL" method="post" target="_blank" style="display:inline-grid;justify-items:center;align-content:start;gap:0.5rem;">
    <input class="pp-5FYD6BMD2M2BL" type="submit" value="Pay Now" />
    <img class="payment-icons" src="https://www.paypalobjects.com/images/Debit_Credit.svg" alt="cards" />
    <section style="font-size: 0.75rem;"> <img src="https://www.paypalobjects.com/paypal-ui/logos/svg/paypal-wordmark-color.svg" alt="paypal" style="height:0.875rem;vertical-align:middle;"/></section>
  </form>
</div>

<script>
  const SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwKkMAaXvJJQA9ZYw865Jdcn1D_qNmEm459dTm2UTW3jaUdCqGqkS9puVR5NXrjGMir/exec";
  const orderForm = document.getElementById("order-form");
  const paypalForm = document.getElementById("paypal-form");

  async function sendCustomerData() {
    const data = {
      fullName: document.getElementById("fullName").value.trim(),
      firstName: document.getElementById("firstName").value.trim(),
      address: document.getElementById("address").value.trim(),
      country: document.getElementById("country").value.trim(),
      city: document.getElementById("city").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      postalCode: document.getElementById("postalCode").value.trim(),
      color: document.getElementById("color").value
    };

    await fetch(SHEETS_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
  }

  paypalForm.addEventListener("submit", async function(event) {
    event.preventDefault();

    if (!orderForm.checkValidity()) {
      orderForm.reportValidity();
      return;
    }

    try {
      await sendCustomerData();
    } catch (error) {
      console.error("Failed to send customer data to Google Sheets", error);
    }

    paypalForm.submit();
  });
</script>

</body>
</html>
