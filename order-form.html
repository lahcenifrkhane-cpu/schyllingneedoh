<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(440px, 100%);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      padding: 22px;
    }
    h2 {
      margin: 0 0 14px;
      color: #222;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    input,
    select {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      padding: 10px;
      font-size: 15px;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      justify-items: center;
    }
    .pp-ZDCB495B5ULUC {
      text-align: center;
      border: none;
      border-radius: 0.25rem;
      min-width: 11.625rem;
      padding: 0 2rem;
      height: 2.625rem;
      font-weight: bold;
      background-color: #FFD140;
      color: #000000;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.25rem;
      cursor: pointer;
    }
    .cards {
      height: 20px;
    }
    .paypal-powered {
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Customer Information</h2>

    <form id="order-form">
      <div class="field">
        <input type="text" id="fullName" placeholder="Full Name" required>
      </div>

      <div class="field">
        <input type="text" id="firstName" placeholder="First Name" required>
      </div>

      <div class="field">
        <input type="text" id="address" placeholder="Full Address" required>
      </div>

      <div class="field">
        <input type="text" id="country" placeholder="Country" required>
      </div>

      <div class="field">
        <input type="text" id="city" placeholder="City" required>
      </div>

      <div class="field">
        <input type="text" id="phone" placeholder="Phone Number" required>
      </div>

      <div class="field">
        <input type="text" id="postalCode" placeholder="Postal Code" required>
      </div>

      <div class="field">
        <select id="color" required>
          <option value="" selected disabled>Select Color</option>
          <option value="orange">orange</option>
          <option value="pink">pink</option>
          <option value="blue">blue</option>
          <option value="purple">purple</option>
        </select>
      </div>

      <div class="actions">
        <input class="pp-ZDCB495B5ULUC" type="submit" value="pay now" />
        <img class="cards" src="https://www.paypalobjects.com/images/Debit_Credit.svg" alt="cards" />
        <section class="paypal-powered"> مدعوم من <img src="https://www.paypalobjects.com/paypal-ui/logos/svg/paypal-wordmark-color.svg" alt="paypal" style="height:0.875rem;vertical-align:middle;"/></section>
      </div>
    </form>
  </div>

  <script>
    const SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWZR9c2C6SRs9kIfM5gR3Cnrp51malv67WFXl5XQ9VxufN7IryKRU52EGISNDSwrqz/exec";

    async function sendData(event) {
      event.preventDefault();

      const data = {
        fullName: document.getElementById("fullName").value,
        firstName: document.getElementById("firstName").value,
        address: document.getElementById("address").value,
        country: document.getElementById("country").value,
        city: document.getElementById("city").value,
        phone: document.getElementById("phone").value,
        postalCode: document.getElementById("postalCode").value,
        color: document.getElementById("color").value
      };

      try {
        await fetch(SHEETS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
      } catch (error) {
        console.error("Error submitting order", error);
      }

      const query = new URLSearchParams(data).toString();
      window.location.href = `product-checkout.html?${query}`;
    }

    document.getElementById("order-form").addEventListener("submit", sendData);
  </script>

</body>
</html>
